<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="China Import">
<title>China Products</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0D0D0D;
  --s1:#161616;
  --s2:#1E1E1E;
  --border:rgba(255,255,255,.07);
  --text:#F5F0E8;
  --muted:rgba(245,240,232,.38);
  --gold:#E8B84B;
  --mint:#3ECFB2;
  --coral:#FF6B6B;
  --sky:#7EB8FF;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);font-family:'Outfit',sans-serif;color:var(--text);overscroll-behavior:none}
::-webkit-scrollbar{display:none}
input,button{font-family:'Outfit',sans-serif}
input::placeholder{color:rgba(245,240,232,.2)}
input:focus{outline:none}
input[type=date]{color-scheme:dark}
#app{min-height:100vh;padding-bottom:calc(80px + env(safe-area-inset-bottom,0px))}

.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:calc(48px + env(safe-area-inset-top,0px)) 20px 18px}
.topbar-inner{display:flex;justify-content:space-between;align-items:flex-end}
.eyebrow{font-size:10px;font-weight:600;letter-spacing:.18em;color:var(--gold);text-transform:uppercase;margin-bottom:4px;opacity:.8}
.app-title{font-weight:800;font-size:26px;color:var(--text);letter-spacing:-.02em}
.add-btn{background:var(--gold);color:#0D0D0D;border:none;border-radius:12px;padding:11px 20px;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.02em}

.tabbar{position:fixed;bottom:0;left:0;right:0;background:rgba(13,13,13,.97);backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,10px);z-index:100}
.tb{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;color:rgba(245,240,232,.25);transition:color .2s}
.tb.on{color:var(--gold)}
.tb .ic{font-size:20px}
.tb .lb{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase}

.page{padding:16px;display:none}
.page.on{display:block}

/* HERO */
.hero{background:var(--s1);border-radius:22px;padding:24px 22px;margin-bottom:14px;border:1px solid var(--border);position:relative;overflow:hidden}
.hero-glow{position:absolute;top:-50px;right:-50px;width:180px;height:180px;background:radial-gradient(circle,rgba(232,184,75,.1),transparent 70%);pointer-events:none}
.hero-label{font-size:10px;font-weight:600;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.hero-num{font-weight:900;font-size:50px;letter-spacing:-2px;line-height:1}
.hero-sub{font-size:12px;color:var(--muted);margin-top:8px;font-weight:500}

/* STRIP */
.strip{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.strip-box{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:14px 10px;text-align:center;position:relative;overflow:hidden}
.strip-accent{position:absolute;top:0;left:0;right:0;height:2px;border-radius:2px 2px 0 0}
.strip-val{font-weight:800;font-size:20px;margin-bottom:3px}
.strip-lbl{font-size:10px;color:var(--muted);font-weight:500;letter-spacing:.04em}

/* CHART */
.chart-card{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:18px 14px;margin-bottom:14px}
.chart-title{font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:14px}

/* PRODUCT CARDS */
.pcard{background:var(--s1);border:1px solid var(--border);border-radius:22px;margin-bottom:12px;overflow:hidden}
.pcard-img{width:100%;height:180px;object-fit:cover;display:block}
.pcard-img-placeholder{width:100%;height:180px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:50px}
.pcard-body{padding:16px}
.pcard-name{font-weight:700;font-size:17px;color:var(--text);margin-bottom:4px;letter-spacing:-.01em}
.pcard-meta{font-size:11px;color:var(--muted);font-weight:500;margin-bottom:14px}
.pcard-profit{font-weight:900;font-size:22px}

.prog-track{height:5px;background:rgba(255,255,255,.07);border-radius:3px;margin-bottom:5px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .6s ease}
.prog-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:14px}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px}
.stat-cell{text-align:center;padding:11px 4px}
.stat-cell:not(:last-child){border-right:1px solid var(--border)}
.stat-val{font-weight:800;font-size:18px;margin-bottom:2px}
.stat-lbl{font-size:9px;color:var(--muted);font-weight:600;letter-spacing:.06em;text-transform:uppercase}

.pcard-btns{display:flex;gap:8px}
.btn-sale{flex:1;background:rgba(62,207,178,.1);border:1px solid rgba(62,207,178,.22);color:var(--mint);border-radius:12px;padding:11px;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.02em}
.btn-edit{background:var(--s2);border:1px solid var(--border);color:var(--muted);border-radius:12px;padding:11px 16px;font-size:12px;font-weight:600;cursor:pointer}

/* INVENTORY */
.card{background:var(--s1);border:1px solid var(--border);border-radius:20px;overflow:hidden}
.divider{height:1px;background:var(--border)}
.inv-row{padding:14px 16px;display:flex;align-items:center;gap:12px}
.inv-img{width:48px;height:48px;border-radius:12px;object-fit:cover;flex-shrink:0}
.inv-img-ph{width:48px;height:48px;border-radius:12px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.inv-bar{height:4px;background:rgba(255,255,255,.06);border-radius:2px;margin:7px 0 4px;overflow:hidden}
.inv-fill{height:100%;border-radius:2px}

/* REPORTS */
.rep-row{padding:13px 16px;display:flex;align-items:center;gap:12px}

/* MODALS */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:flex-end;z-index:200;backdrop-filter:blur(16px)}
.modal-ov.on{display:flex}
.modal-sh{background:var(--s1);border-radius:28px 28px 0 0;padding:22px;width:100%;max-height:93vh;overflow-y:auto;padding-bottom:calc(22px + env(safe-area-inset-bottom,0px));border-top:1px solid rgba(232,184,75,.18)}
.handle{width:36px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin:0 auto 20px}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.modal-title{font-weight:800;font-size:20px;color:var(--text)}
.close-btn{background:var(--s2);border:none;color:var(--muted);border-radius:10px;width:32px;height:32px;font-size:16px;cursor:pointer}
.fi{width:100%;background:var(--s2);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:13px 15px;font-size:16px;color:var(--text);margin-bottom:12px}
.fl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:5px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sub-btn{width:100%;background:var(--gold);color:#0D0D0D;border:none;border-radius:14px;padding:16px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.del-btn{width:100%;background:transparent;color:var(--coral);border:1px solid rgba(255,107,107,.18);border-radius:14px;padding:13px;font-size:13px;font-weight:600;cursor:pointer;margin-top:10px}
.prev-box{border-radius:12px;padding:13px 15px;margin-bottom:14px;display:none}

.sale-sh{background:var(--s1);border-radius:28px 28px 0 0;padding:22px;width:100%;max-height:60vh;overflow-y:auto;padding-bottom:calc(22px + env(safe-area-inset-bottom,0px));border-top:1px solid rgba(62,207,178,.2)}
.sale-btn{width:100%;background:var(--mint);color:#0D0D0D;border:none;border-radius:14px;padding:16px;font-size:15px;font-weight:700;cursor:pointer}

#loadscreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:300;flex-direction:column;gap:14px}
#loadscreen.gone{display:none}
.spin{width:34px;height:34px;border:2.5px solid rgba(232,184,75,.15);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.saving{position:fixed;top:calc(12px + env(safe-area-inset-top,0px));right:16px;background:rgba(62,207,178,.1);border:1px solid rgba(62,207,178,.25);color:var(--mint);border-radius:20px;padding:7px 14px;font-size:11px;font-weight:700;z-index:500;opacity:0;transition:opacity .3s;letter-spacing:.05em}
.saving.show{opacity:1}
.sec{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:12px}

.PALETTE0{--acc:#E8B84B} .PALETTE1{--acc:#3ECFB2} .PALETTE2{--acc:#7EB8FF} .PALETTE3{--acc:#B97FFF} .PALETTE4{--acc:#FF6B6B}
</style>
</head>
<body>

<div id="loadscreen">
  <div class="spin"></div>
  <div style="font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.1em">LOADING</div>
</div>
<div class="saving" id="savebadge">SAVED ✓</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-inner">
      <div>
        <div class="eyebrow">China Import</div>
        <div class="app-title">Products Ledger</div>
      </div>
      <button class="add-btn" onclick="openAdd()">＋ Add</button>
    </div>
  </div>

  <!-- HOME -->
  <div id="phome" class="page on">
    <div class="hero">
      <div class="hero-glow"></div>
      <div class="hero-label">Net Profit</div>
      <div class="hero-num" id="hprofit">$0</div>
      <div class="hero-sub" id="hsub">—</div>
    </div>
    <div class="strip">
      <div class="strip-box"><div class="strip-accent" style="background:var(--gold)"></div><div class="strip-val" id="krev" style="color:var(--gold)">$0</div><div class="strip-lbl">Revenue</div></div>
      <div class="strip-box"><div class="strip-accent" style="background:var(--mint)"></div><div class="strip-val" id="ksold" style="color:var(--mint)">0</div><div class="strip-lbl">Sold</div></div>
      <div class="strip-box"><div class="strip-accent" style="background:var(--sky)"></div><div class="strip-val" id="kstock" style="color:var(--sky)">0</div><div class="strip-lbl">In Stock</div></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Revenue vs Cost</div>
      <div style="position:relative;height:150px"><canvas id="mchart"></canvas></div>
    </div>
    <div class="sec">All Products</div>
    <div id="homeplist"></div>
  </div>

  <!-- STOCK -->
  <div id="pinventory" class="page">
    <div class="sec">Stock Overview</div>
    <div class="card" id="invlist"></div>
  </div>

  <!-- REPORTS -->
  <div id="preports" class="page">
    <div class="chart-card" style="margin-bottom:14px">
      <div class="chart-title">Profit by Product</div>
      <div style="position:relative;height:200px"><canvas id="cchart"></canvas></div>
    </div>
    <div class="sec">Sell-Through Rate</div>
    <div class="card" style="margin-bottom:14px" id="strlist"></div>
    <div class="sec">Days in Inventory</div>
    <div class="card" id="agelist"></div>
  </div>

  <div class="tabbar">
    <button class="tb on" onclick="swTab('home',this)"><span class="ic">⚡</span><span class="lb">Home</span></button>
    <button class="tb" onclick="swTab('inventory',this)"><span class="ic">📦</span><span class="lb">Stock</span></button>
    <button class="tb" onclick="swTab('reports',this)"><span class="ic">📊</span><span class="lb">Reports</span></button>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-ov" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-sh">
    <div class="handle"></div>
    <div class="modal-hdr">
      <div id="mtitle" class="modal-title">New Product</div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <label class="fl">Product Name</label><input class="fi" id="fname" placeholder="e.g. Brass Shower Set">
    <label class="fl">Product Photo</label>
    <div id="photo-preview" style="display:none;margin-bottom:12px;position:relative">
      <img id="preview-img" style="width:100%;height:160px;object-fit:cover;border-radius:12px;display:block">
      <button onclick="clearPhoto()" style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);border:none;color:#fff;border-radius:20px;width:28px;height:28px;font-size:14px;cursor:pointer">✕</button>
    </div>
    <label id="photo-upload-btn" style="display:block;background:var(--s2);border:1px dashed rgba(255,255,255,.15);border-radius:12px;padding:16px;text-align:center;cursor:pointer;margin-bottom:12px;color:var(--muted);font-size:13px;font-weight:600">
      📷 Tap to upload photo
      <input type="file" id="fphoto" accept="image/*" style="display:none" onchange="handlePhoto(this)">
    </label>
    <div class="grid2">
      <div><label class="fl">Total Qty</label><input class="fi" id="fqty" type="number" min="0" placeholder="0"></div>
      <div><label class="fl">Cost/Unit (CAD)</label><input class="fi" id="funitcost" type="number" min="0" step="0.01" placeholder="0.00"></div>
    </div>
    <div class="grid2">
      <div><label class="fl">Total Cost ($)</label><input class="fi" id="ftotalcost" type="number" min="0" step="0.01" placeholder="0.00" oninput="uprev()"></div>
      <div><label class="fl">Avg Sale ($)</label><input class="fi" id="favgsale" type="number" min="0" step="0.01" placeholder="0.00"></div>
    </div>
    <div class="grid2">
      <div><label class="fl">Units Sold</label><input class="fi" id="funits" type="number" min="0" placeholder="0"></div>
      <div><label class="fl">Defective</label><input class="fi" id="fdefect" type="number" min="0" placeholder="0"></div>
    </div>
    <div class="grid2">
      <div><label class="fl">Total Revenue ($)</label><input class="fi" id="frev" type="number" min="0" step="0.01" placeholder="0.00" oninput="uprev()"></div>
      <div><label class="fl">Purchase Date</label><input class="fi" id="fdp" type="date"></div>
    </div>
    <div class="prev-box" id="prev">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span id="pproft" style="font-weight:800;font-size:15px"></span>
        <span id="proi" style="font-size:12px;color:var(--muted)"></span>
      </div>
    </div>
    <button class="sub-btn" id="subbtn" onclick="saveProduct()">Add Product</button>
    <button class="del-btn" id="delbtn" style="display:none" onclick="delProduct()">🗑 Delete Product</button>
  </div>
</div>

<!-- SALE MODAL -->
<div class="modal-ov" id="salemodal" onclick="if(event.target===this)closeSaleModal()">
  <div class="sale-sh">
    <div class="handle"></div>
    <div style="font-weight:800;font-size:18px;color:var(--text);margin-bottom:4px">Log a Sale</div>
    <div id="sname" style="font-size:12px;color:var(--muted);margin-bottom:18px"></div>
    <label class="fl">Units Sold</label><input class="fi" id="fsaleunits" type="number" min="1" placeholder="1">
    <label class="fl">Sale Amount ($)</label><input class="fi" id="fsaleamt" type="number" min="0" step="0.01" placeholder="0.00">
    <button class="sale-btn" onclick="confirmSale()">✓ Confirm Sale</button>
  </div>
</div>

var products=[], editId=null, saleId=null, saveTimer=null, mChart=null, cChart=null;
var ACCS=["#E8B84B","#3ECFB2","#7EB8FF","#B97FFF","#FF6B6B"];
var BGAS=["rgba(232,184,75,.1)","rgba(62,207,178,.1)","rgba(126,184,255,.1)","rgba(185,127,255,.1)","rgba(255,107,107,.1)"];

function $m(v){ return (v<0?"-$":"$")+Math.abs(v).toLocaleString("en",{maximumFractionDigits:0}); }
function dSince(d){ return d?Math.floor((Date.now()-new Date(d))/86400000):0; }
function fmtDate(d){ if(!d) return ""; var p=d.split("-"),mn=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]; return mn[parseInt(p[1])-1]+" "+parseInt(p[2])+", 20"+p[0].slice(2); }
var SHEET_URL="https://script.google.com/macros/s/AKfycbzxjjHB7o8Wnu7sn2gS4Zptejb-2YqXRptUmul-JO7WnmnnokcFBNAOeIVS75lAWTKeYw/exec";

function showSaved(){ var b=document.getElementById("savebadge"); b.className="saving show"; setTimeout(function(){ b.className="saving"; },1600); }

function loadLocal(){ try{ var s=localStorage.getItem("china_v3"); if(s){ var d=JSON.parse(s); if(Array.isArray(d)&&d.length>0){ products=d; return true; } } }catch(e){} return false; }

function saveLocal(){ try{ localStorage.setItem("china_v3",JSON.stringify(products)); showSaved(); }catch(e){} }

function backupToSheets(){
  try{
    // Strip img data before sending to sheets (too large)
    var slim=products.map(function(p){
      var n=Object.assign({},p); delete n.img; return n;
    });
    fetch(SHEET_URL,{method:"POST",body:JSON.stringify(slim)}).catch(function(){});
  }catch(e){}
}

function restoreFromSheets(){
  return fetch(SHEET_URL).then(function(r){ return r.json(); }).then(function(data){
    if(!Array.isArray(data)||data.length===0) return false;
    // Merge sheet data with local RAW imgs
    products=data.map(function(r){
      var raw=RAW.filter(function(x){ return x.id==r.id; })[0];
      return {
        id:Number(r.id)||Date.now(),
        name:r.name||"",
        emoji:r.emoji||"📦",
        img:raw?raw.img:null,
        qty:Number(r.qty)||0,
        unitCost:Number(r.unitCost)||0,
        totalCost:Number(r.totalCost)||0,
        avgSale:Number(r.avgSale)||0,
        unitsSold:Number(r.unitsSold)||0,
        unitsDefect:Number(r.unitsDefect)||0,
        revenue:Number(r.revenue)||0,
        purchaseDate:r.purchaseDate||""
      };
    });
    return true;
  });
}

function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(function(){
    saveLocal();        // instant — saves to phone
    backupToSheets();   // silent background sync to Google Sheets
  },400);
}

function hideLoader(){ 
  try{ document.getElementById("loadscreen").className="gone"; }catch(e){} 
}

function init(){
  // Always hide loader after 5s no matter what
  setTimeout(hideLoader, 5000);

  try{
    var loaded = loadLocal();
    if(loaded){
      hideLoader();
      try{ renderAll(); }catch(e){ console.log("renderAll err",e); }
      return;
    }
  }catch(e){}

  // First load — try Google Sheets, fall back to RAW after 4s
  var done = false;
  function finish(data){
    if(done) return;
    done = true;
    try{
      if(Array.isArray(data) && data.length > 0){
        products = data;
      } else {
        products = RAW.slice();
      }
      saveLocal();
      backupToSheets();
    }catch(e){ products = RAW.slice(); }
    hideLoader();
    try{ renderAll(); }catch(e){ console.log("renderAll err",e); }
  }

  setTimeout(function(){ finish([]); }, 4000);

  try{
    restoreFromSheets()
      .then(function(ok){ if(ok) finish(products); else finish([]); })
      .catch(function(){ finish([]); });
  }catch(e){ finish([]); }
}
function renderAll(){ renderHome(); renderInventory(); renderReports(); }

function calc(p){
  var inStock=Math.max(0,p.qty-p.unitsSold-p.unitsDefect);
  var profit=p.revenue-p.totalCost;
  var str=p.qty>0?Math.round((p.unitsSold/p.qty)*100):0;
  var roi=p.totalCost>0?Math.round((profit/p.totalCost)*100):0;
  return {inStock:inStock,profit:profit,str:str,roi:roi};
}

function renderHome(){
  var tp=0,tr=0,tc=0,ts=0,tst=0;
  products.forEach(function(p){ var c=calc(p); tp+=c.profit; tr+=p.revenue; tc+=p.totalCost; ts+=p.unitsSold; tst+=c.inStock; });
  var hel=document.getElementById("hprofit");
  hel.textContent=$m(tp);
  hel.style.color=tp>=0?"var(--gold)":"var(--coral)";
  document.getElementById("hsub").textContent="$"+Math.round(tc).toLocaleString()+" invested · $"+Math.round(tr).toLocaleString()+" revenue";
  document.getElementById("krev").textContent="$"+Math.round(tr).toLocaleString();
  document.getElementById("ksold").textContent=ts;
  document.getElementById("kstock").textContent=tst;
  renderBarChart(); renderHomeList();
}

function renderBarChart(){
  var ctx=document.getElementById("mchart").getContext("2d");
  if(mChart) mChart.destroy();
  mChart=new Chart(ctx,{type:"bar",data:{labels:products.map(function(p){ return p.name.split(" ").slice(0,2).join(" "); }),datasets:[{label:"Revenue",data:products.map(function(p){ return Math.round(p.revenue); }),backgroundColor:"rgba(232,184,75,.7)",borderRadius:5,borderSkipped:false},{label:"Cost",data:products.map(function(p){ return Math.round(p.totalCost); }),backgroundColor:"rgba(126,184,255,.4)",borderRadius:5,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"rgba(245,240,232,.35)",font:{size:10},boxWidth:10}},tooltip:{callbacks:{label:function(c){ return c.dataset.label+": $"+Math.round(c.raw).toLocaleString(); }}}},scales:{x:{grid:{display:false},ticks:{color:"rgba(245,240,232,.3)",font:{size:9}}},y:{grid:{color:"rgba(255,255,255,.04)"},ticks:{color:"rgba(245,240,232,.25)",font:{size:9},callback:function(v){ return "$"+v; }}}}}});
}

function imgEl(p,cls,style){
  if(p.img) return '<img src="'+p.img+'" class="'+cls+'" style="'+style+'">';
  return '<div class="'+cls+'-ph">'+p.emoji+'</div>';
}

function renderHomeList(){
  var html="";
  products.forEach(function(p,i){
    var c=calc(p),acc=ACCS[i%ACCS.length],bga=BGAS[i%BGAS.length];
    var age=dSince(p.purchaseDate),ageCol=age>60?"var(--coral)":age>30?"#FBBF24":"var(--mint)",ageTag=age>60?"STALE":age>30?"SLOW":"FRESH";
    html+='<div class="pcard" style="border-color:'+acc+'22">';
    if(p.img) html+='<img src="'+p.img+'" class="pcard-img">';
    else html+='<div class="pcard-img-placeholder">'+p.emoji+'</div>';
    html+='<div class="pcard-body">';
    html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">';
    html+='<div class="pcard-name">'+p.name+'</div>';
    html+='<div class="pcard-profit" style="color:'+(c.profit>=0?"var(--mint)":"var(--coral)")+'">'+(c.profit>=0?"+":"")+$m(c.profit)+'</div></div>';
    html+='<div class="pcard-meta">'+p.qty+' units · Avg $'+p.avgSale.toFixed(0)+'/unit · '+fmtDate(p.purchaseDate)+'</div>';
    html+='<div class="prog-track"><div class="prog-fill" style="width:'+c.str+'%;background:'+acc+'"></div></div>';
    html+='<div class="prog-labels"><span>'+c.str+'% sold</span><span style="color:'+ageCol+';font-weight:600">'+age+'d · '+ageTag+'</span></div>';
    html+='<div class="stats-row">';
    html+='<div class="stat-cell"><div class="stat-val" style="color:'+acc+'">'+p.unitsSold+'</div><div class="stat-lbl">Sold</div></div>';
    html+='<div class="stat-cell"><div class="stat-val" style="color:var(--sky)">'+c.inStock+'</div><div class="stat-lbl">Stock</div></div>';
    html+='<div class="stat-cell"><div class="stat-val" style="color:var(--coral)">'+p.unitsDefect+'</div><div class="stat-lbl">Defect</div></div>';
    html+='</div>';
    html+='<div class="pcard-btns">';
    html+='<button class="btn-sale" onclick="openSale('+p.id+')">＋ Log Sale</button>';
    html+='<button class="btn-edit" onclick="openEdit('+p.id+')">✎ Edit</button>';
    html+='</div></div></div>';
  });
  document.getElementById("homeplist").innerHTML=html||'<div style="text-align:center;color:var(--muted);padding:50px">No products yet</div>';
}

function renderInventory(){
  var html="";
  var sorted=products.slice().sort(function(a,b){ return calc(b).inStock-calc(a).inStock; });
  sorted.forEach(function(p,i){
    var c=calc(p),idx=products.indexOf(p),acc=ACCS[idx%ACCS.length];
    var age=dSince(p.purchaseDate),ageCol=age>60?"var(--coral)":age>30?"#FBBF24":"var(--mint)",ageTag=age>60?"STALE":age>30?"SLOW":"FRESH";
    var pct=p.qty>0?Math.round((c.inStock/p.qty)*100):0;
    if(i>0) html+='<div class="divider"></div>';
    html+='<div class="inv-row">';
    if(p.img) html+='<img src="'+p.img+'" class="inv-img">';
    else html+='<div class="inv-img-ph">'+p.emoji+'</div>';
    html+='<div style="flex:1;min-width:0">';
    html+='<div style="font-weight:700;font-size:14px;color:var(--text);margin-bottom:2px">'+p.name+'</div>';
    html+='<div class="inv-bar"><div class="inv-fill" style="width:'+pct+'%;background:'+acc+'"></div></div>';
    html+='<div style="display:flex;justify-content:space-between;font-size:10px"><span style="color:var(--muted)">'+pct+'% left · '+p.unitsSold+' sold</span><span style="color:'+ageCol+';font-weight:700">'+age+'d · '+ageTag+'</span></div>';
    if(p.unitsDefect>0) html+='<div style="font-size:10px;color:var(--coral);margin-top:3px">⚠ '+p.unitsDefect+' defective</div>';
    html+='</div>';
    html+='<div style="text-align:right;margin-left:12px;flex-shrink:0"><div style="font-weight:900;font-size:26px;color:'+acc+'">'+c.inStock+'</div><div style="font-size:10px;color:var(--muted)">left</div></div>';
    html+='</div>';
  });
  document.getElementById("invlist").innerHTML=html;
}

function renderReports(){
  var ctx=document.getElementById("cchart").getContext("2d");
  if(cChart) cChart.destroy();
  cChart=new Chart(ctx,{type:"bar",data:{labels:products.map(function(p){ return p.name.split(" ").slice(0,2).join(" "); }),datasets:[{data:products.map(function(p){ return Math.round(calc(p).profit); }),backgroundColor:products.map(function(p,i){ return calc(p).profit>=0?ACCS[i%ACCS.length]+"BB":"rgba(255,107,107,.6)"; }),borderRadius:8,borderSkipped:false}]},options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){ return "$"+Math.round(c.raw).toLocaleString(); }}}},scales:{x:{grid:{color:"rgba(255,255,255,.04)"},ticks:{color:"rgba(245,240,232,.3)",font:{size:9},callback:function(v){ return "$"+v; }}},y:{grid:{display:false},ticks:{color:"rgba(245,240,232,.45)",font:{size:10}}}}}});

  var sh="";
  products.slice().sort(function(a,b){ return calc(b).str-calc(a).str; }).forEach(function(p,i){
    var c=calc(p),idx=products.indexOf(p),acc=ACCS[idx%ACCS.length];
    if(i>0) sh+='<div class="divider"></div>';
    sh+='<div style="padding:13px 16px">';
    sh+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px">';
    sh+='<div style="display:flex;align-items:center;gap:10px">';
    if(p.img) sh+='<img src="'+p.img+'" style="width:32px;height:32px;border-radius:8px;object-fit:cover">';
    else sh+='<span style="font-size:18px">'+p.emoji+'</span>';
    sh+='<span style="font-weight:700;font-size:14px">'+p.name+'</span></div>';
    sh+='<span style="font-weight:800;font-size:16px;color:'+acc+'">'+c.str+'%</span></div>';
    sh+='<div class="inv-bar"><div class="inv-fill" style="width:'+c.str+'%;background:'+acc+'"></div></div>';
    sh+='<div style="font-size:10px;color:var(--muted);margin-top:4px">'+p.unitsSold+' of '+p.qty+' sold · '+c.inStock+' remaining</div></div>';
  });
  document.getElementById("strlist").innerHTML=sh;

  var ah="";
  products.slice().sort(function(a,b){ return dSince(b.purchaseDate)-dSince(a.purchaseDate); }).forEach(function(p,i){
    var age=dSince(p.purchaseDate),ageCol=age>60?"var(--coral)":age>30?"#FBBF24":"var(--mint)",tag=age>60?"STALE":age>30?"SLOW":"FRESH";
    var c=calc(p);
    if(i>0) ah+='<div class="divider"></div>';
    ah+='<div class="rep-row">';
    if(p.img) ah+='<img src="'+p.img+'" style="width:40px;height:40px;border-radius:10px;object-fit:cover;flex-shrink:0">';
    else ah+='<span style="font-size:22px">'+p.emoji+'</span>';
    ah+='<div style="flex:1;min-width:0"><div style="font-weight:700;font-size:14px;color:var(--text)">'+p.name+'</div>';
    ah+='<div style="font-size:10px;color:var(--muted);margin-top:3px">'+c.inStock+' units left · '+fmtDate(p.purchaseDate)+'</div></div>';
    ah+='<div style="text-align:right"><div style="font-weight:900;font-size:20px;color:'+ageCol+'">'+age+'d</div>';
    ah+='<div style="font-size:9px;font-weight:700;color:'+ageCol+';letter-spacing:.07em">'+tag+'</div></div></div>';
  });
  document.getElementById("agelist").innerHTML=ah;
}

var pendingImg = null;

function handlePhoto(input){
  var file = input.files[0]; if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    pendingImg = e.target.result;
    document.getElementById("preview-img").src = pendingImg;
    document.getElementById("photo-preview").style.display = "block";
    document.getElementById("photo-upload-btn").style.display = "none";
  };
  reader.readAsDataURL(file);
  // Resize before storing
  var img2 = new Image();
  img2.onload = function(){
    var canvas = document.createElement("canvas");
    var maxW = 600, maxH = 600;
    var w = img2.width, ht = img2.height;
    if(w > maxW){ ht = Math.round(ht*(maxW/w)); w = maxW; }
    if(ht > maxH){ w = Math.round(w*(maxH/ht)); ht = maxH; }
    canvas.width = w; canvas.height = ht;
    canvas.getContext("2d").drawImage(img2, 0, 0, w, ht);
    pendingImg = canvas.toDataURL("image/jpeg", 0.75);
    document.getElementById("preview-img").src = pendingImg;
  };
  var fr2 = new FileReader();
  fr2.onload = function(e){ img2.src = e.target.result; };
  fr2.readAsDataURL(file);
}

function clearPhoto(){
  pendingImg = null;
  document.getElementById("photo-preview").style.display = "none";
  document.getElementById("photo-upload-btn").style.display = "block";
  document.getElementById("fphoto").value = "";
}

function setPhotoPreview(src){
  if(src){
    pendingImg = src;
    document.getElementById("preview-img").src = src;
    document.getElementById("photo-preview").style.display = "block";
    document.getElementById("photo-upload-btn").style.display = "none";
  } else {
    clearPhoto();
  }
}

function openAdd(){
  editId=null;
  document.getElementById("mtitle").textContent="New Product";
  document.getElementById("subbtn").textContent="Add Product";
  document.getElementById("delbtn").style.display="none";
  ["fname","fqty","funitcost","ftotalcost","favgsale","funits","fdefect","frev"].forEach(function(id){ document.getElementById(id).value=""; });
  document.getElementById("fdp").value=new Date().toISOString().slice(0,10);
  document.getElementById("prev").style.display="none";
  clearPhoto();
  document.getElementById("modal").className="modal-ov on";
  setTimeout(function(){ document.getElementById("fname").focus(); },100);
}
function openEdit(id){
  var p=products.filter(function(x){ return x.id===id; })[0]; if(!p) return;
  editId=id;
  document.getElementById("mtitle").textContent="Edit Product";
  document.getElementById("subbtn").textContent="Save Changes";
  document.getElementById("delbtn").style.display="block";
  document.getElementById("fname").value=p.name||"";
  document.getElementById("fqty").value=p.qty||"";
  document.getElementById("funitcost").value=p.unitCost||"";
  document.getElementById("ftotalcost").value=p.totalCost||"";
  document.getElementById("favgsale").value=p.avgSale||"";
  document.getElementById("funits").value=p.unitsSold||"";
  document.getElementById("fdefect").value=p.unitsDefect||"";
  document.getElementById("frev").value=p.revenue||"";
  document.getElementById("fdp").value=p.purchaseDate||"";
  setPhotoPreview(p.img||null);
  uprev();
  document.getElementById("modal").className="modal-ov on";
}
function closeModal(){ document.getElementById("modal").className="modal-ov"; }

function uprev(){
  var cost=parseFloat(document.getElementById("ftotalcost").value),rev=parseFloat(document.getElementById("frev").value),el=document.getElementById("prev");
  if(!isNaN(cost)&&!isNaN(rev)){
    var pr=rev-cost,roi=cost>0?((pr/cost)*100).toFixed(0):0;
    el.style.display="block";el.style.background=pr>=0?"rgba(62,207,178,.08)":"rgba(255,107,107,.08)";
    el.style.border="1px solid "+(pr>=0?"rgba(62,207,178,.2)":"rgba(255,107,107,.2)");
    document.getElementById("pproft").textContent=(pr>=0?"↑ +":"↓ ")+$m(Math.abs(pr))+" profit";
    document.getElementById("pproft").style.color=pr>=0?"var(--mint)":"var(--coral)";
    document.getElementById("proi").textContent=roi+"% ROI";
  } else { el.style.display="none"; }
}

function saveProduct(){
  var name=document.getElementById("fname").value.trim(); if(!name) return;
  var existing=editId?products.filter(function(x){ return x.id===editId; })[0]:null;
  var p={
    id:editId||Date.now(),name:name,
    emoji:existing?existing.emoji:"📦",
    img:pendingImg!==null?pendingImg:(existing?existing.img:null),
    qty:parseInt(document.getElementById("fqty").value)||0,
    unitCost:parseFloat(document.getElementById("funitcost").value)||0,
    totalCost:parseFloat(document.getElementById("ftotalcost").value)||0,
    avgSale:parseFloat(document.getElementById("favgsale").value)||0,
    unitsSold:parseInt(document.getElementById("funits").value)||0,
    unitsDefect:parseInt(document.getElementById("fdefect").value)||0,
    revenue:parseFloat(document.getElementById("frev").value)||0,
    purchaseDate:document.getElementById("fdp").value||new Date().toISOString().slice(0,10)
  };
  if(editId) products=products.map(function(x){ return x.id===editId?p:x; });
  else products.push(p);
  closeModal(); renderAll(); scheduleSave();
}
function delProduct(){
  if(!confirm("Delete this product?")) return;
  products=products.filter(function(p){ return p.id!==editId; });
  closeModal(); renderAll(); scheduleSave();
}

function openSale(id){
  saleId=id;
  var p=products.filter(function(x){ return x.id===id; })[0];
  document.getElementById("sname").textContent=p?p.name:"";
  document.getElementById("fsaleunits").value="1";
  document.getElementById("fsaleamt").value=p&&p.avgSale?p.avgSale.toFixed(2):"";
  document.getElementById("salemodal").className="modal-ov on";
  setTimeout(function(){ document.getElementById("fsaleunits").focus(); },100);
}
function closeSaleModal(){ document.getElementById("salemodal").className="modal-ov"; }
function confirmSale(){
  var units=parseInt(document.getElementById("fsaleunits").value)||0,amt=parseFloat(document.getElementById("fsaleamt").value)||0;
  if(!units||!saleId) return;
  products=products.map(function(p){
    if(p.id!==saleId) return p;
    var n=Object.assign({},p);
    n.unitsSold=(n.unitsSold||0)+units;
    n.revenue=(n.revenue||0)+amt;
    return n;
  });
  closeSaleModal(); renderAll(); scheduleSave();
}

function swTab(tab,btn){
  document.querySelectorAll(".page").forEach(function(p){ p.classList.remove("on"); });
  document.querySelectorAll(".tb").forEach(function(b){ b.classList.remove("on"); });
  document.getElementById("p"+tab).classList.add("on");
  btn.classList.add("on");
}

init();
</script>
